# ─────────────────────────────────────────
# 메뉴/아이템 폰트 크기 (커맨드라인, 선택메뉴)
# UI 폰트 설정 가능
# ─────────────────────────────────────────
; UI 전용 폰트 파일명 (생략시 font_file 사용)
ui_font_file=Galmuri9.ttf
; UI 전용 폰트 크기 (생략시 font_size 사용)
ui_font_size=12               

# ─────────────────────────────────────────
# 전체 폰트 크기 (9~15 권장, 아래 크기별 권장값 참고)
# ─────────────────────────────────────────
font_size=12


# ─────────────────────────────────────────
# 메시지 박스 너비 (픽셀)
# ─────────────────────────────────────────
box_width=266

# ─────────────────────────────────────────
# 박스 좌우 여백 (픽셀)
# ─────────────────────────────────────────
box_padding=4

# ─────────────────────────────────────────
# 텍스트 시작 X 오프셋 (박스 왼쪽 기준)
# ─────────────────────────────────────────
text_offset_x=5

# ─────────────────────────────────────────
# 텍스트 시작 Y 오프셋 (박스 상단 기준)
# ─────────────────────────────────────────
text_offset_y=5

# ─────────────────────────────────────────
# 줄간격 추가 픽셀 (폰트높이 + 이 값)
# ─────────────────────────────────────────
line_spacing=1

# ─────────────────────────────────────────
# 글씨 색상 팔레트 인덱스 (1=원본 게임과 동일 0=검정 글씨 2=흰색 글씨)
# ─────────────────────────────────────────
text_color=2

# ─────────────────────────────────────────
# 랜더 모드 : 0=보통 1=부드럽게 2=선명하게 (권장)
# ─────────────────────────────────────────
render_mode=2

# ─────────────────────────────────────────
# 글자 테두리 : 1=사용 0=미사용
# ─────────────────────────────────────────
outline=1

# ─────────────────────────────────────────
# [miss_log 설정] - 미번역 문장 자동 저장
# ─────────────────────────────────────────
# 미번역 문장 로그 저장 여부 (1=저장, 0=저장안함)
# ─────────────────────────────────────────
miss_log=1

# ─────────────────────────────────────────
# 로그 파일명 (게임 폴더에 생성됨)
# ─────────────────────────────────────────
miss_log_file=miss_translations.txt

# ─────────────────────────────────────────
# 메뉴 언어 설정: en=영어 ko=한글 (액션 메뉴만 영어로 표시합니다 나머지는 한글)
# ko 설정시 한글 액션 메뉴 사용
# en 설정시 영문 액션 메뉴 사용(원본)
# 게임 팔레트 인덱스 (1=원본, 15=밝은색)
# 15 = 녹색, 13 = 노랑, 8 = 주황, 5 = 핑크, 3 = 빨강
# ─────────────────────────────────────────
memu_language=ko

# =============================================
# 액션/시스템/확인 메뉴 (SelectionMenu 공통)
# 15 = 녹색, 14 = 연보라(추천), 13 = 밝은노랑, 12 = 연주황, 11 = 매우 어두운 진한 빨강, 10 = 어두운 붉은색(추천), 9 = 주황, 
# 8 = 연노랑, 7 = 남색(추천), 6 = 진한갈색, 5 = 핑크, 4 = 마젠타(원본, 추천), 3 = 밝은 빨강, 2 = 흰색, 1 = 회색빛이 도는 하늘색 , 0 = 검정
# =============================================
# 액션/시스템/확인 메뉴 (SelectionMenu 공통) 박스 배경 팔레트 인덱스 (1=원본(기본))(14 권장)
menu_bg_color             = 11
# 액션/시스템/확인 메뉴 (SelectionMenu 공통) 비선택 항목 글씨 (2=원본(기본))
menu_text_color_normal    = 2
# 액션/시스템/확인 메뉴 (SelectionMenu 공통) 선택(하이라이트) 항목 글씨 (2=원본(기본))
menu_text_color_selected  = 1

# =============================================
# 행동 실패 메시지 (failureMessages)
# 15 = 녹색, 14 = 연보라(추천), 13 = 밝은노랑, 12 = 연주황, 11 = 매우 어두운 진한 빨강, 10 = 어두운 붉은색(추천), 9 = 주황, 
# 8 = 연노랑, 7 = 남색(추천), 6 = 진한갈색, 5 = 핑크, 4 = 마젠타(원본, 추천), 3 = 밝은 빨강, 2 = 흰색, 1 = 회색빛이 도는 하늘색 , 0 = 검정
# =============================================
# 행동 실패 메시지 (failureMessages) 항목 박스 배경 팔레트 인덱스 (4=원본(기본))
failure_bg_color          = 7

# 행동 실패 메시지 (failureMessages) 항목 글씨 (2=원본(기본))
failure_text_color        = 2

# =============================================
# 시스템 알림 메시지 (otherMessages)
# 일시정지·저장·불러오기 등
# 15 = 녹색, 14 = 연보라(추천), 13 = 밝은노랑, 12 = 연주황, 11 = 매우 어두운 진한 빨강, 10 = 어두운 붉은색(추천), 9 = 주황, 
# 8 = 연노랑, 7 = 남색(추천), 6 = 진한갈색, 5 = 핑크, 4 = 마젠타(원본, 추천), 3 = 밝은 빨강, 2 = 흰색, 1 = 회색빛이 도는 하늘색 , 0 = 검정
# =============================================
# 시스템 알림 메시지 (otherMessages) 항목 박스 배경 팔레트 인덱스 (4=원본(기본))
other_bg_color            = 14

# 시스템 알림 메시지 (otherMessages) 항목 글씨 (2=원본(기본))
other_text_color          = 2

# =============================================
# 하단 메시지 창
# 15 = 녹색, 14 = 연보라(추천), 13 = 밝은노랑, 12 = 연주황, 11 = 매우 어두운 진한 빨강, 10 = 어두운 붉은색(추천), 9 = 주황, 
# 8 = 연노랑, 7 = 남색(추천), 6 = 진한갈색, 5 = 핑크, 4 = 마젠타(원본, 추천), 3 = 밝은 빨강, 2 = 흰색, 1 = 회색빛이 도는 하늘색 , 0 = 검정
# =============================================
# 하단 메시지 창 배경 (검정)(1=원본(기본))
cmd_bg_color     = 0   
# 하단 메시지 창 테두리 (흰색)(2=원본(기본))
cmd_border_color = 2   
# 하단 메시지 창 글씨 (2=원본(기본))
cmd_text_color   = 2   

